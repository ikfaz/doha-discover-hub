  <text x="338" y="140" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="800">Qatar Visa-Free Entry vs Hayya E-Visa</text>
  <text x="338" y="190" fill="#F9D8B9" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Basics for smoother travel planning</text>

  <rect x="170" y="246" width="604" height="464" rx="28" fill="url(#cardLeft)"/>
  <rect x="826" y="246" width="604" height="464" rx="28" fill="url(#cardRight)"/>

  <text x="220" y="304" fill="#1E4771" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Visa-Free Path</text>
  <text x="220" y="346" fill="#2E5F8D" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Check eligibility, then fly with documents ready.</text>
  <text x="220" y="398" fill="#2A5278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1) Passport validity buffer</text>
  <text x="220" y="434" fill="#2A5278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2) Return/onward ticket</text>
  <text x="220" y="470" fill="#2A5278" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3) Hotel proof and insurance plan</text>
  <text x="220" y="530" fill="#684126" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Best for eligible short visits.</text>

  <text x="876" y="304" fill="#8A421B" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Hayya E-Visa Path</text>
  <text x="876" y="346" fill="#9C562A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Apply online first when pre-approval is required.</text>
  <text x="876" y="398" fill="#8E4A21" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1) Choose category (A1/A2/A3/A4/F1)</text>
  <text x="876" y="434" fill="#8E4A21" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2) Upload passport and trip details</text>
  <text x="876" y="470" fill="#8E4A21" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3) Submit, monitor, and present permit</text>
  <text x="876" y="530" fill="#684126" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Best for non-eligible passports.</text>

