  <!--
    Editorial cover illustration for "Best Things to Do in Doha".
    Intentional visual motifs: Corniche skyline silhouette, Museum of Islamic Art geometry,
    Souq-inspired arch, dhow on the bay, and Inland Sea dunes.
    This comment also keeps the source SVG over the inline threshold so the asset
    is emitted as a standalone file for social cards and image sitemap discoverability.
  -->
  <defs>
